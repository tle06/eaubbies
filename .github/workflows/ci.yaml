---
name: CI

on:
  push:
    branches:
      - main
    paths:
      - "eaubbies/src/**"
      - "eaubbies/etc/**"
      - "eaubbies/entrypoint/**"
      - "eaubbies/Dockerfile"
      - "docker-compose.yml"

  pull_request:
    paths:
      - "eaubbies/src/**"
      - "eaubbies/etc/**"
      - "eaubbies/entrypoint/**"
      - "eaubbies/Dockerfile"
      - "docker-compose.yml"

  workflow_dispatch:
  workflow_call:

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  workflows:
    uses: hassio-addons/workflows/.github/workflows/addon-ci.yaml@main
