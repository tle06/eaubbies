---
name: CI

on:
  push:
    branches:
      - main
    paths:
      - "eaubbies/src/**"
      - "eaubbies/etc/**"
      - "eaubbies/entrypoint/**"
      - "eaubbies/Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/**"

  pull_request:
    paths:
      - "eaubbies/src/**"
      - "eaubbies/etc/**"
      - "eaubbies/entrypoint/**"
      - "eaubbies/Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/**"

  workflow_dispatch:
  workflow_call:

permissions:
  actions: read
  contents: read
  packages: read
  pull-requests: read
  security-events: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  information:
    name: Gather app information
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.information.outputs.architectures }}
      build: ${{ steps.information.outputs.build }}
      description: ${{ steps.information.outputs.description }}
      name: ${{ steps.information.outputs.name }}
      slug: ${{ steps.override.outputs.slug }}
      target: ${{ steps.information.outputs.target }}
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: 🚀 Run app information action
        id: information
        uses: frenck/action-addon-information@ce1377e9851cf569c29329e65fb2c57e67ca0f69 # v1.4.2
      - name: 🚀 Process possible slug override
        id: override
        env:
          DETECTED_SLUG: ${{ steps.information.outputs.slug }}
          INPUT_SLUG: ${{ inputs.slug }}
        run: |
          slug="${DETECTED_SLUG}"
          if [[ -n "${INPUT_SLUG}" ]]; then
            slug="${INPUT_SLUG}"
          fi
          echo "slug=${slug}" >> "$GITHUB_OUTPUT"

  lint-app:
    name: Lint App
    needs:
      - information
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: 🚀 Run App Lint
        uses: frenck/action-addon-linter@v2.21.0
        with:
          community: false
          path: "./${{ needs.information.outputs.target }}"

  lint-hadolint:
    name: Hadolint
    needs:
      - information
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: 🚀 Run Hadolint
        uses: brpaz/hadolint-action@c27bd9edc1e95eed30474db8f295ff5807ebca14 # v1.5.0
        with:
          dockerfile: "./${{ needs.information.outputs.target }}/Dockerfile"

  lint-json:
    name: JSON Lint
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: 🚀 Run JQ
        run: |
          shopt -s globstar nullglob
          for file in **/*.json; do
            if ! jq '.' "$file" > /dev/null 2>&1; then
              echo "::error file=${file}::Invalid JSON in ${file}"
              jq '.' "$file"
              exit 1
            fi
          done

  lint-shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: 🚀 Run Shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: -s bash

  lint-yamllint:
    name: YAMLLint
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: 🚀 Run YAMLLint
        uses: frenck/action-yamllint@34b4bbcaeabedcfefad6adea8c5bbc42af0e2d47 # v1.5.0

  lint-prettier:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: 🚀 Run Prettier
        uses: creyD/prettier_action@v4.6
        with:
          prettier_options: --check **/*.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: 🚀 Run zizmor
        uses: zizmorcore/zizmor-action@v0.5.6

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: 👀 Dependency review
        uses: actions/dependency-review-action@v5.0.0

  formatting-black:
    name: Formatting python file with Black
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "Install UV and repository dependencies"
        uses: ./.github/actions/uv
      - name: Run Black in check mode
        run: |
          cd eaubbies/src/
          uv run black . --check

  lint-flake8:
    name: Linting python files with flake8
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "Install UV and repository dependencies"
        uses: ./.github/actions/uv
      - name: Run Flake8
        run: |
          cd eaubbies/src/
          uv run flake8 .

  test-pytest:
    name: Run pytest suite
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install UV and repository dependencies
        uses: ./.github/actions/uv

      - name: Run tests
        run: |
          source eaubbies/src/.venv/bin/activate;
          cd eaubbies/src/
          pytest

  build:
    name: Build ${{ matrix.architecture }}
    needs:
      - information
      - lint-app
      - lint-hadolint
      - lint-json
      - lint-prettier
      - lint-shellcheck
      - lint-yamllint
      #- lint-zizmor
      - lint-flake8
      - formatting-black
      - test-pytest
    runs-on: ${{ matrix.architecture == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      matrix:
        architecture: ${{ fromJson(needs.information.outputs.architectures) }}
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: 🏗 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0
      - name: ℹ️ Compose build flags
        id: flags
        env:
          ARCHITECTURE: ${{ matrix.architecture }}
          BUILD_FILE: ${{ needs.information.outputs.build }}
        run: |
          echo "date=$(date +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"
          from=$(yq --no-colors eval ".build_from.${ARCHITECTURE}" "${BUILD_FILE}")
          echo "from=${from}" >> "$GITHUB_OUTPUT"

          if [[ "${ARCHITECTURE}" = "amd64" ]]; then
            echo "platform=linux/amd64" >> "$GITHUB_OUTPUT"
          elif [[ "${ARCHITECTURE}" = "aarch64" ]]; then
            echo "platform=linux/arm64/v8" >> "$GITHUB_OUTPUT"
          else
            echo "::error ::Could not determine platform for architecture ${ARCHITECTURE}"
            exit 1
          fi
      - name: 🚀 Build
        uses: docker/build-push-action@v7.2.0
        with:
          push: false
          # zizmor: ignore[template-injection] - path input to action, not shell-executed
          context: ${{ needs.information.outputs.target }}
          file: ${{ needs.information.outputs.target }}/Dockerfile
          cache-from: |
            type=gha,scope=${{ matrix.architecture }}
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ needs.information.outputs.slug }}/${{ matrix.architecture }}:edge
          cache-to: type=gha,mode=max,scope=${{ matrix.architecture }}
          platforms: ${{ steps.flags.outputs.platform }}
          build-args: |
            BUILD_ARCH=${{ matrix.architecture }}
            BUILD_DATE=${{ steps.flags.outputs.date }}
            BUILD_DESCRIPTION=${{ needs.information.outputs.description }}
            BUILD_FROM=${{ steps.flags.outputs.from }}
            BUILD_NAME=${{ needs.information.outputs.name }}
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_VERSION=edge
