  formatting-black:
    name: Formatting python file with Black
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: "Install UV and repository dependencies"
        uses: ./.github/actions/uv
      - name: Run Black in check mode
        run: |
          cd eaubbies/src/
          uv run black . --check

  lint-flake8:
    name: Linting python files with flake8
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: "Install UV and repository dependencies"
        uses: ./.github/actions/uv
      - name: Run Flake8
        run: |
          uv run flake8 .

  test-pytest:
    name: Run pytest suite
    runs-on: ubuntu-latest
    needs:
      - lint-flake8
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install UV and repository dependencies
        uses: ./.github/actions/uv

      - name: Run tests
        run: |
          source eaubbies/src/.venv/bin/activate
          cd eaubbies/src/
          pytest
