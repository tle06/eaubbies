name: Deploy

# yamllint disable-line rule:truthy
on:
  release:
    types:
      - published

permissions:
  actions: read
  contents: write # 1. Changed to 'write' so the workflow can push commits
  packages: read
  security-events: read
  pull-requests: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yaml
  publish:
    name: Publish
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          persist-credentials: true # 2. Changed to 'true' to authenticate our git push

      - name: Login to DockerHub
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Update the file locally so the Home Assistant builder compiles it correctly
      - name: Update version for builder
        run: |
          yq -i '.version = "${{ github.event.release.tag_name }}"' eaubbies/config.yaml

      # 4. Build and publish the Docker images
      - name: Publish
        uses: home-assistant/builder@master
        with:
          args: |
            --amd64 \
            --aarch64 \
            --target eaubbies \
            --docker-hub tlnk

      # 5. Create, Approve, and Auto-Merge the Pull Request
      - name: Create and Auto-Approve Pull Request
        env:
          # Used to CREATE the PR (Author: github-actions[bot])
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Used to APPROVE and MERGE the PR (Reviewer: You)
          REVIEWER_TOKEN: ${{ secrets.AUTO_APPROVE_PAT }}
        run: |
          # Create a distinct branch for this version bump
          BRANCH_NAME="bump-version-${{ github.event.release.tag_name }}"
          git checkout -b $BRANCH_NAME

          # Apply the release tag version
          yq -i '.version = "${{ github.event.release.tag_name }}"' eaubbies/config.yaml

          # Configure official GitHub Actions Bot identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage, commit, and push the new branch
          git add eaubbies/config.yaml
          git commit -m "chore: bump addon version to ${{ github.event.release.tag_name }}"
          git push origin $BRANCH_NAME

          # 1. Create the PR and capture its URL
          PR_URL=$(gh pr create \
            --title "chore: bump addon version to ${{ github.event.release.tag_name }}" \
            --body "Automated version bump triggered by release ${{ github.event.release.tag_name }}." \
            --base main \
            --head $BRANCH_NAME)

          echo "Created Pull Request at: $PR_URL"

          # 2. Approve the PR using your Personal Access Token (Fixed flag here)
          GH_TOKEN="$REVIEWER_TOKEN" gh pr review "$PR_URL" --approve -b "Auto-approved by Release Workflow"

          # 3. Merge the PR automatically
          GH_TOKEN="$REVIEWER_TOKEN" gh pr merge "$PR_URL" --squash --delete-branch
