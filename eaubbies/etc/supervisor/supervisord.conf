[supervisord]
nodaemon=true
user=root

[program:gunicorn]
command=/app/.venv/bin/gunicorn -c /app/gunicorn.conf.py
directory=/app
user=www-data
autostart=true
autorestart=true
startsecs=5
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0 
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0 
priority=100

[program:nginx]
command=nginx -g 'daemon off;'
autostart=true
autorestart=true
startsecs=5
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0 
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0 
priority=200